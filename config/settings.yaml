# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "openai"  # AiHubMix is OpenAI-compatible
  model: "gemini-2.0-flash"  # 默认走 Gemini 网关模型，可切换: gemini-2.5-flash, gpt-4o
  # Use env var: LLM_API_KEY
  base_url: "https://aihubmix.com/v1"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"  # AiHubMix hosts qwen3-embedding-4b directly
  model: "qwen3-embedding-4b"
  # Use env var: EMBEDDING_API_KEY
  base_url: "https://aihubmix.com/v1"
  dimensions: 2560  # Qwen3-Embedding-4B output dimension

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "openai"
  model: "gpt-4o"
  # Use env var: VISION_LLM_API_KEY
  base_url: "https://aihubmix.com/v1"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  # 选项: qdrant（生产推荐）, chroma（开发用，默认本地持久化）
  provider: "qdrant"

  # ── ChromaDB 配置（provider: chroma 时使用）────────────
  # persist_directory: "./data/db/chroma"
  # collection_name: "default"

  # ── Qdrant Cloud 配置（provider: qdrant 时使用）─────────
  # 在 Render Dashboard 设置以下环境变量：
  #   QDRANT_URL       – e.g. https://your-cluster.cloud.qdrant.io
  #   QDRANT_API_KEY   – your Qdrant API key
  #   QDRANT_COLLECTION_NAME – e.g. default
  #   QDRANT_VECTOR_DIM     – 2560 (qwen3-embedding-4b)
  qdrant_url: ""           # 留空，从环境变量读取
  qdrant_api_key: ""       # 留空，从环境变量读取
  qdrant_collection_name: "default"
  qdrant_vector_dim: 2560

  # Chroma fallback（本地开发用，生产请用 Qdrant）
  persist_directory: "./data/db/chroma"
  collection_name: "default"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: false
  provider: "none"  # Options: none, cross_encoder, llm
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 10

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: true
  provider: "composite"  # Options: none, custom, ragas, composite
  backends:
    - "custom"
    - "ragas"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"
    - "answer_relevancy"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 100

  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: true  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement

  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment
