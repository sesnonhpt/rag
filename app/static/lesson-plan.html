<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教学模板生成 - RAG 知识库</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary-color: #255399;
      --primary-hover: #1f4886;
      --secondary-color: #f4f7fc;
      --text-color: #111827;
      --text-light: #6b7280;
      --border-color: rgba(17, 24, 39, 0.12);
      --error-color: #ef4444;
      --success-color: #15803d;
      --background: #ffffff;
      --card-background: #ffffff;
      --panel-background: #ffffff;
      --shadow-soft: none;
      --shadow-card: none;
      --accent-warm: #255399;
      --accent-deep: #1f4886;
      --button-soft-bg: #edf3fb;
      --button-soft-hover: #e4edf9;
      --button-soft-border: rgba(37, 83, 153, 0.22);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      background: var(--background);
      min-height: 100vh;
      color: var(--text-color);
      letter-spacing: 0.01em;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    header {
      margin-bottom: 20px;
      position: relative;
      overflow: visible;
      padding: 0 0 18px;
      border-radius: 0;
      background: transparent;
      border: 1px solid var(--border-color);
      border-top: none;
      border-left: none;
      border-right: none;
      color: var(--text-color);
    }

    header::before {
      content: none;
    }

    .hero-kicker {
      display: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      align-items: start;
    }

    .header-title {
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      font-size: clamp(28px, 3vw, 34px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text-color);
      max-width: none;
    }

    .header-subtitle {
      max-width: 760px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-light);
    }

    .hero-panel {
      position: relative;
      z-index: 1;
    }

    .hero-aside {
      display: none;
    }

    .hero-metric {
      padding: 16px 16px 14px;
      border-radius: 12px;
      background: #fbfbfc;
      border: 1px solid var(--border-color);
    }

    .hero-metric-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .hero-metric-value {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-color);
    }

    .page-shell {
      display: grid;
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--panel-background);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: none;
      padding: 18px;
      margin-bottom: 14px;
    }

    .sidebar-stack {
      display: grid;
      gap: 12px;
      align-self: start;
      top: 20px;
    }

    .card-title {
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-color);
    }

    .card-caption {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-color);
    }

    .form-group input[type="text"],
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(24, 33, 38, 0.14);
      border-radius: 6px;
      font-size: 14px;
      background: #ffffff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input[type="text"]:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.08);
    }

    .form-group textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.7;
      font-family: inherit;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
      box-shadow: none;
      border-color: var(--primary-color);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: none;
      box-shadow: none;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--button-soft-bg);
      border: 1px solid var(--button-soft-border);
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background: var(--button-soft-hover);
    }

    .result-section {
      min-width: 0;
    }

    .result-card {
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: none;
    }

    .result-card-title {
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-card-content {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-color);
    }

    .history-list {
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
      background: #ffffff;
    }

    .history-head {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr 0.7fr;
      gap: 10px;
      padding: 10px 12px;
      background: #fafafa;
      border-bottom: 1px solid var(--border-color);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-light);
      font-weight: 700;
    }

    .history-empty {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-light);
      padding: 12px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr 0.7fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
      background: #ffffff;
    }

    .history-item:hover {
      background: #fafafa;
    }

    .history-meta {
      display: block;
    }

    .history-topic {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
      line-height: 1.45;
      word-break: break-word;
    }

    .history-summary {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-light);
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-time {
      font-size: 12px;
      color: var(--text-light);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .history-tag {
      display: inline-block;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    .history-btn {
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .history-btn-primary {
      background: var(--button-soft-bg);
      color: var(--text-color);
      border-color: var(--button-soft-border);
    }

    .history-btn-primary:hover {
      background: var(--button-soft-hover);
    }

    .history-btn-secondary {
      background: #ffffff;
      color: var(--text-light);
      border-color: rgba(24, 33, 38, 0.12);
    }

    .history-btn-secondary:hover {
      background: #f8f8f8;
    }

    .history-btn-neutral {
      background: var(--primary-color);
      color: #ffffff;
      border-color: var(--primary-color);
    }

    .history-btn-neutral:hover {
      background: var(--primary-hover);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .result-card-content ul {
      margin-left: 20px;
      margin-top: 8px;
    }

    .result-card-content li {
      margin-bottom: 4px;
    }

    .resources-section {
      margin-top: 24px;
    }

    .resource-item {
      background: #ffffff;
      border: 1px solid rgba(24, 33, 38, 0.08);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .resource-item::before {
      content: none;
    }

    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .resource-source {
      font-weight: 700;
      color: var(--text-color);
      font-size: 13px;
    }

    .resource-score {
      font-size: 11px;
      color: var(--text-light);
      background: transparent;
      padding: 0;
      border-radius: 0;
    }

    .resource-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-light);
      margin-top: 6px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-content {
      text-align: center;
      padding: 20px 22px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(24, 33, 38, 0.08);
      box-shadow: none;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }

    .loading-dots span {
      width: 12px;
      height: 12px;
      background: var(--text-color);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
    }

    .loading-text {
      font-size: 16px;
      color: var(--text-color);
    }

    .error-message {
      background: #fff7f7;
      border: 1px solid #f1d4d4;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 24px;
      color: var(--error-color);
      box-shadow: none;
    }

    /* Markdown 渲染样式 */
    .markdown-content {
      line-height: 1.8;
      color: var(--text-color);
    }

    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    .markdown-content h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 2.4em;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.35em;
    }

    .markdown-content h2 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 1.6em;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3em;
    }

    .markdown-content h3 {
      font-size: 1.28em;
    }

    .markdown-content h4 {
      font-size: 1em;
    }

    .markdown-content p {
      margin-bottom: 16px;
      overflow-wrap: anywhere;
    }

    .markdown-content p.lesson-image-title {
      text-align: center;
      margin: 22px auto 10px;
      color: #213547;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin-bottom: 16px;
      padding-left: 2em;
    }

    .markdown-content li {
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .markdown-content code {
      background: rgba(24, 33, 38, 0.06);
      padding: 2px 6px;
      border-radius: 8px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
    }

    .markdown-content pre {
      background: #f8fafb;
      color: var(--text-color);
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      overflow-x: visible;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      margin-bottom: 16px;
    }

    .markdown-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      white-space: inherit;
    }

    .markdown-content blockquote {
      border-left: none;
      /* border: 1px solid var(--border-color); */
      padding: 14px 16px;
      /* margin: 14px 0 18px; */
      color: var(--text-color);
      font-style: normal;
      /* border-radius: 16px; */
      overflow-wrap: anywhere;
    }

    .markdown-content blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
    }

    .markdown-content th,
    .markdown-content td {
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      text-align: left;
    }

    .markdown-content th {
      background: rgba(15, 118, 110, 0.08);
      font-weight: 600;
    }

    .markdown-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 24px 0;
    }

    .markdown-content a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .markdown-content a:hover {
      text-decoration: underline;
    }

    .markdown-content img {
      display: block;
      width: min(100%, 440px);
      margin: 18px auto 12px;
      border-radius: 6px;
      border: 1px solid rgba(24, 33, 38, 0.08);
      box-shadow: none;
      background: #fff;
    }

    .markdown-content .lesson-image-block {
      margin: 24px 0 28px;
    }

    .markdown-content .lesson-image-block img {
      margin-bottom: 12px;
    }

    .markdown-content .lesson-image-block.lesson-image-compact img {
      width: min(100%, 280px);
    }

    .markdown-content img.lesson-image-compact {
      width: min(100%, 280px);
    }

    .markdown-content blockquote.lesson-image-source {
      display: none;
    }

    .markdown-content strong {
      font-weight: 600;
    }

    .markdown-content em {
      font-style: italic;
    }

    @media (max-width: 768px) {
      #app {
        padding: 18px 16px 40px;
      }

      header {
        padding: 24px 20px;
      }

      .hero-grid,
      .page-shell {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .card,
      .result-card {
        padding: 22px;
      }

      .history-head {
        display: none;
      }

      .history-item {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .history-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="hero-kicker">Teaching Material Builder</div>
      <div class="hero-grid">
        <div class="hero-panel">
          <h1 class="header-title">智能教案</h1>
          <p class="header-subtitle">支持综合模版(增强版)、教学设计、导学案三种模式，面向真实课堂准备，减少堆砌感，让产出更清楚、更稳、更像成稿。</p>
        </div>
        <div class="hero-aside">
          <div class="hero-metric">
            <div class="hero-metric-label">内容方向</div>
            <div class="hero-metric-value">综合模版(增强版)更适合讲练结合，教学设计更适合教师备课，导学案更适合学生任务单。</div>
          </div>
          <div class="hero-metric">
            <div class="hero-metric-label">资料依据</div>
            <div class="hero-metric-value">优先依据知识库内容生成，并保留参考文档检索结果供回看。</div>
          </div>
        </div>
      </div>
    </header>

    <div class="page-shell">
      <div class="sidebar-stack">
        <div class="card">
          <h2 class="card-title">模板设置</h2>
          <!-- <p class="card-caption">保持操作简单，只保留最关键的选择项。输入主题后，系统会按所选模式生成更像正式成稿的教学内容。</p> -->

          <div class="form-group">
            <label for="topic-input">内容主题</label>
            <input type="text" id="topic-input" placeholder="例如：法拉第与电磁感应" />
          </div>

          <div class="form-group">
            <label for="notes-input">备注</label>
            <textarea id="notes-input" placeholder="例如：希望更偏实验探究；增加生活案例；课堂互动多一点；减少公式推导。"></textarea>
          </div>

          <div class="form-group">
            <label for="template-category">模板类别</label>
            <select id="template-category">
              <option value="comprehensive">综合模版(增强版)</option>
              <option value="teaching_design">教学设计</option>
              <option value="guide">导学案模板</option>
            </select>
          </div>

        <div class="form-group">
          <small style="color: var(--text-light); display: block; line-height: 1.75;" id="template-description">
            💡 综合模版(增强版)：融合教学设计、学生任务、互动设计、分层训练与配图讲解，生成增强版成稿
          </small>
          <small style="color: var(--text-light); display: block; line-height: 1.7; margin-top: 6px;" id="planning-indicator"></small>
        </div>

          <div class="form-group">
            <label for="model-select">LLM模型</label>
            <select id="model-select">
              <option value="">默认模型 (gemini-2.0-flash)</option>
              <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
              <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="gemini-flash-latest">Gemini Flash Latest</option>
              <option value="gemini-flash-lite-latest">Gemini Flash Lite Latest</option>
              <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
              <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
              <option value="gemma-3-4b-it">Gemma 3 4B IT</option>
              <option value="gemma-3-12b-it">Gemma 3 12B IT</option>
              <option value="gemma-3-27b-it">Gemma 3 27B IT</option>
              <option value="gpt-4.1-free">GPT-4.1 Free</option>
              <option value="coding-glm-5-free">Coding GLM-5 Free</option>
              <option value="gpt-4o">GPT-4o</option>
              <option value="gpt-4o-mini">GPT-4o Mini</option>
              <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
            </select>
          </div>

          <div class="button-group">
            <button class="btn btn-primary" id="generate-btn">生成内容</button>
            <button class="btn btn-secondary" id="reset-btn">重置</button>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">最近生成</h2>
          <p class="card-caption">保留最近几次主题与模板选择，方便回看或继续生成。</p>
          <div class="history-list" id="history-list"></div>
        </div>
      </div>

      <div class="result-section" id="result-section" style="display: none;">
        <div class="result-card">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;">
            <h3 class="result-card-title" style="margin-bottom: 0;">生成内容</h3>
            <button class="btn btn-primary" id="export-doc-btn" type="button" disabled>导出 DOCX</button>
          </div>
          <div class="result-card-content markdown-content" id="lesson-content"></div>
        </div>

        <div class="result-card resources-section">
          <h3 class="result-card-title">参考文档</h3>
          <div id="resources-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-content">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-text">正在生成中</div>

    const modelSelect = document.getElementById('model-select');
    const generateBtn = document.getElementById('generate-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultSection = document.getElementById('result-section');

    const exportDocBtn = document.getElementById('export-doc-btn');
    const loadingOverlay = document.getElementById('loading-overlay');

    const exportDocBtnDefaultText = exportDocBtn ? exportDocBtn.textContent : '导出 DOCX';
    const CONVERSATION_STATE_KEY = 'lesson_plan_conversation_state';
    const HISTORY_STORAGE_KEY = 'lesson_plan_history_records';
    const historyList = document.getElementById('history-list');
    // Frontend mock switch follows backend environment config from /client-config.

    const templateCategorySelect = document.getElementById('template-category');

    const MOCK_RULES = [
      { topic: '牛顿第三定律', templateCategory: 'guide' },
      { topic: '牛顿第三定律', templateCategory: 'teaching_design' },
      { topic: '牛顿第三定律', templateCategory: 'comprehensive' },
      { topic: '牛顿第三定律', templateCategory: 'guide', notes: '增加生活案例、增加图片' },
      { topic: '牛顿第三定律', templateCategory: 'teaching_design', notes: '增加生活案例、增加图片' },
      { topic: '牛顿第三定律', templateCategory: 'comprehensive', notes: '增加生活案例、增加图片' },
      { topic: '牛顿第二定律', templateCategory: 'teaching_design' },
      { topic: '牛顿第二定律', templateCategory: 'comprehensive' },
      { topic: '牛顿第二定律', templateCategory: 'guide', notes: '增加生活案例' },
      { topic: '速度和速率有什么区别', templateCategory: 'comprehensive' },
    ];

    const defaultTemplateCatalog = [
      {
        category: 'comprehensive',
        template_type: 'comprehensive_master',
        label: '综合模版(增强版)',
        description: '💡 综合模版(增强版)：融合教学设计、学生任务、互动设计、分层训练与配图讲解，生成增强版成稿',
        default: true,
      },
      {
        category: 'teaching_design',
        template_type: 'teaching_design_master',
        label: '教学设计',
        description: '💡 教学设计：贴近真实教师备课稿，突出教学目标、重难点、教学过程与板书设计',
        default: false,
      },
      {
        category: 'guide',
        template_type: 'guide_master',
        label: '导学案模板',
        description: '💡 导学案模板：自动判断学科，按学校导学案体例生成固定结构成稿',
        default: false,
      },
    ];
    let templateCatalog = [...defaultTemplateCatalog];
    let templateDescriptionMap = Object.fromEntries(
      templateCatalog.map(item => [item.category, item.description])
    );

    function getDefaultTemplateCategory() {
      const fromCatalog = templateCatalog.find(item => item.default)?.category;
      return fromCatalog || 'comprehensive';
    }

    function applyTemplateCatalog(catalog) {
      const safeCatalog = Array.isArray(catalog) && catalog.length ? catalog : defaultTemplateCatalog;
      templateCatalog = safeCatalog.map(item => ({
        category: String(item.category || '').trim(),
        label: String(item.label || '').trim(),
        description: String(item.description || '').trim(),
        default: !!item.default,
      })).filter(item => item.category && item.label);

      if (!templateCatalog.length) {
        templateCatalog = [...defaultTemplateCatalog];
      }

      templateDescriptionMap = Object.fromEntries(
        templateCatalog.map(item => [item.category, item.description])
      );

      const previousValue = templateCategorySelect.value;
      templateCategorySelect.innerHTML = templateCatalog
        .map(item => `<option value="${item.category}">${item.label}</option>`)
        .join('');

      const validPrevious = templateCatalog.some(item => item.category === previousValue);
      templateCategorySelect.value = validPrevious ? previousValue : getDefaultTemplateCategory();
      updateTemplateDescription();
    }

    async function loadTemplateCatalog() {
      try {
        const response = await fetch('/lesson-template-categories');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        applyTemplateCatalog(data.templates);
      } catch {
        applyTemplateCatalog(defaultTemplateCatalog);
      }
    }

    async function loadClientConfig() {
      try {
        const response = await fetch('/client-config');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        enableTopicTemplateMock = !!data.lesson_plan_mock_enabled;
      } catch {
        enableTopicTemplateMock = false;
      }
    }

    function updateTemplateDescription() {
      const category = templateCategorySelect.value;
      templateDescription.textContent = templateDescriptionMap[category] || '';
    }

    templateCategorySelect.addEventListener('change', updateTemplateDescription);

    function showLoading(show) {
      loadingOverlay.style.display = show ? 'flex' : 'none';
      generateBtn.disabled = show;
      exportDocBtn.disabled = show || !lessonContent.textContent.trim();
      if (!show && loadingText) {
        loadingText.textContent = '正在生成中';
      }
    }

    function setExportLoading(show) {
      generateBtn.disabled = show;
      exportDocBtn.disabled = show || !lessonContent.textContent.trim();
      exportDocBtn.textContent = show ? '导出中...' : exportDocBtnDefaultText;
    }

    function sanitizeFilename(value) {
      return String(value || '教案')
        .replace(/[\\/:*?"<>|]/g, '_')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 60) || '教案';
    }

    function normalizeLessonMarkdown(markdown) {
      let text = String(markdown || '').replace(/\r\n/g, '\n');
      text = text.replace(/([^\n])\n(!\[.*?\]\([^)]+\))/g, '$1\n\n$2');
      text = text.replace(/(!\[.*?\]\([^)]+\))\n(> )/g, '$1\n\n$2');
      text = text.replace(/(> [^\n]+)\n(?!>|\n)/g, '$1\n\n');
      text = text.replace(/\n{3,}/g, '\n\n');
      return text.trim();
    }

    function normalizeTopicForMock(topic) {
      return String(topic || '')
        .replace(/\s+/g, '')
        .replace(/[？?！!。.]+$/g, '');
    }

    function normalizeNotesForMock(notes) {
      return String(notes || '').replace(/\s+/g, '').trim();
    }

    function shouldUseMockTopic(topic, templateCategory, notes) {
      if (!enableTopicTemplateMock) return false;
      const normalizedTopic = normalizeTopicForMock(topic);
      const normalizedNotes = normalizeNotesForMock(notes);
      return MOCK_RULES.some((rule) => {
        if (rule.topic !== normalizedTopic) return false;
        if (rule.templateCategory !== String(templateCategory || 'comprehensive')) return false;
        if (Object.prototype.hasOwnProperty.call(rule, 'notes')) {
          return normalizeNotesForMock(rule.notes) === normalizedNotes;
        }
        return true;
      });
    }

    function estimateImageSharpness(img) {
      try {
        const width = Number(img.naturalWidth || 0);
        const height = Number(img.naturalHeight || 0);
        if (!width || !height) return 0;

        const sampleMax = 96;
        const scale = Math.min(1, sampleMax / Math.max(width, height));
        const sampleWidth = Math.max(24, Math.round(width * scale));
        const sampleHeight = Math.max(24, Math.round(height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = sampleWidth;
        canvas.height = sampleHeight;

        const context = canvas.getContext('2d', { willReadFrequently: true });
        if (!context) return 0;

        context.drawImage(img, 0, 0, sampleWidth, sampleHeight);
        const { data } = context.getImageData(0, 0, sampleWidth, sampleHeight);
        if (!data || !data.length) return 0;

        let edgeEnergy = 0;
        let comparisons = 0;
        for (let y = 0; y < sampleHeight - 1; y += 1) {
          for (let x = 0; x < sampleWidth - 1; x += 1) {
            const index = (y * sampleWidth + x) * 4;
            const right = index + 4;
            const down = index + sampleWidth * 4;

            const gray = 0.299 * data[index] + 0.587 * data[index + 1] + 0.114 * data[index + 2];
            const grayRight = 0.299 * data[right] + 0.587 * data[right + 1] + 0.114 * data[right + 2];
            const grayDown = 0.299 * data[down] + 0.587 * data[down + 1] + 0.114 * data[down + 2];

            edgeEnergy += Math.abs(gray - grayRight) + Math.abs(gray - grayDown);
            comparisons += 2;
          }
        }

        return comparisons ? edgeEnergy / comparisons : 0;
      } catch {
        return 0;
      }
    }

    function classifyImageQuality(img) {
      const width = Number(img.naturalWidth || 0);
      const height = Number(img.naturalHeight || 0);
      const area = width * height;
      const shortSide = Math.min(width, height);
      const sharpness = estimateImageSharpness(img);

      if (!width || !height) {
        return { action: 'keep', sharpness, width, height };
      }

      // Keep textbook figures visible. Some valid scanned diagrams are small,
      // and hiding them entirely makes it look like generation returned no images.
      if (area < 28000 || shortSide < 120) {
        return { action: 'compact', sharpness, width, height };
      }

      if ((area < 90000 && sharpness < 10) || (shortSide < 180 && sharpness < 12)) {
        return { action: 'compact', sharpness, width, height };
      }

      if (area < 180000 || shortSide < 260 || sharpness < 14) {
        return { action: 'compact', sharpness, width, height };
      }

      return { action: 'keep', sharpness, width, height };
    }

    function applyImageQualityPolicy(img) {
      if (!img || img.dataset.qualityChecked === 'true') return;

      const finalize = () => {
        img.dataset.qualityChecked = 'true';
        const wrapper = img.closest('.lesson-image-block');
        const target = wrapper || img;

        const decision = classifyImageQuality(img);
        if (decision.action === 'compact') {
          target.classList.add('lesson-image-compact');
        }
      };

      if (img.complete) {
        finalize();
        return;
      }

      img.addEventListener('load', finalize, { once: true });
      img.addEventListener('error', () => {
        img.dataset.qualityChecked = 'true';
      }, { once: true });
    }

    function decorateLessonContent(container) {
      if (!container) return;

      const sourceNodes = Array.from(container.querySelectorAll('blockquote, p'));
      sourceNodes.forEach((node) => {
        const text = String(node.textContent || '').replace(/\s+/g, ' ').trim();
        if (!text) return;
        if (text.startsWith('来源：') || text.includes('/data/images/') || text.includes('/data/pdf/')) {
          node.remove();
        }
      });

      const images = Array.from(container.querySelectorAll('img'));
      Array.from(container.querySelectorAll('p')).forEach((node) => {
        const text = String(node.textContent || '').replace(/\s+/g, ' ').trim();
        if (/^配图\d+[:：]/.test(text)) {
          node.classList.add('lesson-image-title');
        }
      });
      images.forEach((img) => {
        const next = img.nextElementSibling;
        if (!next || next.tagName !== 'BLOCKQUOTE') return;
        if (img.parentElement?.classList.contains('lesson-image-block')) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'lesson-image-block';
        img.parentNode.insertBefore(wrapper, img);
        wrapper.appendChild(img);
        wrapper.appendChild(next);
        next.classList.add('lesson-image-source');
      });

      Array.from(container.querySelectorAll('img')).forEach((img) => {
        applyImageQualityPolicy(img);
      });
    }

    async function exportCurrentLessonAsDocx() {
      const contentText = lessonContent.textContent.trim();
      if (!contentText) {
        showError('当前没有可导出的教案内容');
        return;
      }

      const exportTitle = sanitizeFilename(topicInput.value || '教案');
      setExportLoading(true);

      try {
        const response = await fetch('/lesson-plan/export-docx', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            title: exportTitle,
            content_html: lessonContent.innerHTML,
          }),
        });

        if (!response.ok) {
          let errorText = `导出失败 (${response.status})`;
          try {
            const data = await response.json();
            errorText = formatApiError(data, errorText);
          } catch {}
          throw new Error(errorText);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = `${exportTitle}.docx`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      } catch (error) {
        showError(`DOCX 导出失败：${error.message}`);
      } finally {
        setExportLoading(false);
      }
    }

    function setLoadingText(text) {
      if (loadingText) {
        loadingText.textContent = text;
      }
    }

    function showError(message) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      
      const card = document.querySelector('.card');
      card.insertBefore(errorDiv, card.firstChild);
      
      setTimeout(() => {
        errorDiv.remove();
      }, 5000);
    }

    function formatApiError(payload, fallbackText) {
      if (!payload || typeof payload !== 'object') return fallbackText;
      if (typeof payload.detail === 'string') return payload.detail;
      if (typeof payload.error === 'string' && payload.error.trim()) return payload.error.trim();

      const detail = payload.detail;
      if (!detail || typeof detail !== 'object') return fallbackText;

      const message = typeof detail.message === 'string' ? detail.message.trim() : '';
      const code = typeof detail.code === 'string' ? detail.code.trim() : '';
      const traceId = typeof detail.trace_id === 'string' ? detail.trace_id.trim() : '';

      let text = message || fallbackText;
      if (code) text += ` [${code}]`;
      if (traceId) text += ` (trace: ${traceId.slice(0, 8)})`;
      return text;
    }

    function formatHistoryTime(isoString) {
      if (!isoString) return '';
      try {
        return new Date(isoString).toLocaleString('zh-CN', {
          month: 'numeric',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      } catch {
        return '';
      }
    }

    function buildHistorySummary(record) {
      const modeText = record.planningMode === 'autonomous' ? '自主规划' : '上下文优先';
      if (record.subject) {
        return `${record.subject} · ${record.templateLabel || ''} · ${modeText}`.trim();
      }
      return `${record.templateLabel || '最近生成记录'} · ${modeText}`.trim();
    }

    function persistHistory() {
      localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyRecords));
    }

    async function loadBackendHistory() {
      if (!conversationState?.session_id) return false;
      try {
        const response = await fetch(`/lesson-history?session_id=${encodeURIComponent(conversationState.session_id)}&limit=8`);
        if (!response.ok) return false;
        const data = await response.json();
        historyRecords = Array.isArray(data.records) ? data.records : [];
        persistHistory();
        renderHistory();
        return true;
      } catch {
        return false;
      }
    }

    function renderHistory() {
      if (!historyRecords.length) {
        historyList.innerHTML = '<div class="history-empty">这里会保留最近生成的主题，方便继续修改或快速回看。</div>';
        return;
      }

      historyList.innerHTML = `
        <div class="history-head">
          <div>主题</div>
          <div>时间</div>
          <div style="text-align:right;">操作</div>
        </div>
        ${historyRecords.map((record, index) => `
          <div class="history-item">
            <div class="history-meta">
              <div class="history-tag">${record.templateLabel || '生成记录'}</div>
              <div class="history-topic">${record.topic || '未命名主题'}</div>
              <div class="history-summary">${buildHistorySummary(record)}</div>
            </div>
            <div class="history-time">${formatHistoryTime(record.createdAt) || '-'}</div>
            <div class="history-actions">
              <button class="history-btn history-btn-neutral" type="button" data-history-action="view" data-history-index="${index}">详情</button>
              <button class="history-btn history-btn-primary" type="button" data-history-action="restore" data-history-index="${index}">继续</button>
              <button class="history-btn history-btn-secondary" type="button" data-history-action="delete" data-history-index="${index}">删除</button>
            </div>
          </div>
        `).join('')}
      `;
    }

    function saveHistoryRecord(data) {
      const record = {
        topic: topicInput.value.trim(),
        notes: notesInput.value.trim(),
        templateCategory: templateCategorySelect.value,
        templateLabel: templateCategorySelect.options[templateCategorySelect.selectedIndex]?.textContent || '',
        subject: data.subject || '',
        createdAt: new Date().toISOString(),
        conversationState: data.conversation_state || conversationState || null,
        planningMode: data.planning_mode || 'context_first',
        usedAutonomousFallback: !!data.used_autonomous_fallback,
        lessonContent: data.lesson_content || '',
        id: null,
      };

      if (Array.isArray(data.history_records) && data.history_records.length > 0) {
        historyRecords = data.history_records;
      } else {
        historyRecords = [
          record,
          ...historyRecords.filter(item => !(item.topic === record.topic && item.templateCategory === record.templateCategory))
        ].slice(0, 8);
      }
      persistHistory();
      renderHistory();
    }

    function restoreHistoryRecord(index) {
      const record = historyRecords[index];
      if (!record) return;
      topicInput.value = record.topic || '';
      notesInput.value = record.notes || '';
      templateCategorySelect.value = record.templateCategory || getDefaultTemplateCategory();
      conversationState = record.conversationState || null;
      updateTemplateDescription();
      topicInput.focus();
    }

    function viewHistoryRecord(index) {
      const record = historyRecords[index];
      if (!record) return;
      const content = record.lessonContent || record.lesson_content || '';
      if (!content) {
        showError('这条历史记录暂无完整教案内容，可点击“继续使用”重新生成。');
        return;
      }

      topicInput.value = record.topic || '';
      notesInput.value = record.notes || '';
      templateCategorySelect.value = record.templateCategory || getDefaultTemplateCategory();
      conversationState = record.conversationState || null;
      updateTemplateDescription();

      renderResult({
        topic: record.topic || '',
        subject: record.subject || '',
        lesson_content: content,
        additional_resources: [],
        image_resources: [],
        planning_mode: record.planningMode || 'context_first',
        used_autonomous_fallback: !!record.usedAutonomousFallback,
      }, { showResources: false });
    }

    function renderResult(data, options = {}) {
      resultSection.style.display = 'block';
      const showResources = options.showResources !== false;
      const resourcesSectionEl = document.querySelector('.resources-section');
      if (resourcesSectionEl) {
        resourcesSectionEl.style.display = showResources ? 'block' : 'none';
      }
      const planModeText = data.planning_mode === 'autonomous' ? '本次策略：自主规划' : '本次策略：上下文优先';
      const fallbackHint = data.used_autonomous_fallback ? '（触发过自动兜底）' : '';
      planningIndicator.textContent = `${planModeText}${fallbackHint}`;

      // 渲染生成内容（Markdown格式）
      if (data.lesson_content) {
        lessonContent.innerHTML = marked.parse(normalizeLessonMarkdown(data.lesson_content));
        decorateLessonContent(lessonContent);
        exportDocBtn.disabled = false;
      } else {
        lessonContent.innerHTML = '<p style="color: var(--text-light);">暂无生成内容</p>';
        exportDocBtn.disabled = true;
      }

      // 渲染参考文档（历史详情可选择隐藏）
      if (showResources) {
        if (data.additional_resources && data.additional_resources.length > 0) {
          let resourcesHtml = '<div class="resources-list">';
          data.additional_resources.forEach((resource, index) => {
            resourcesHtml += `
              <div class="resource-item">
                <div class="resource-header">
                  <span class="resource-index">#${index + 1}</span>
                  <span class="resource-source">${resource.source}</span>
                  <span class="resource-score">检索相关度: ${(resource.score * 100).toFixed(1)}%</span>
                </div>
                <div class="resource-text">${resource.text}</div>
              </div>
            `;
          });
          resourcesHtml += '</div>';
          resourcesContent.innerHTML = resourcesHtml;
        } else {
          resourcesContent.innerHTML = '<p style="color: var(--text-light); padding: 16px;">当前未展示参考文档，可能是本地索引未命中或结果经过过滤后为空。</p>';
        }
      }
    }

    function progressTextForStage(stage, payload = {}) {
      switch (stage) {
        case 'queued':
          return '正在建立流式连接...';
        case 'internal_start':
        case 'started':
          return '正在分析主题与准备生成流程...';
        case 'planner_done':
          return `规划完成，准备检索资料${payload.search_query_count ? `（查询 ${payload.search_query_count} 路）` : ''}...`;
        case 'retriever_done':
          return `已检索到 ${payload.relevant_result_count ?? 0} 条相关内容，正在撰写正文...`;
        case 'writer_done':
          return '正文已完成，正在整理结果...';
        case 'orchestration_done':
        case 'completed':
          return '内容生成完成，正在渲染页面...';
        default:
          return `正在生成内容，请稍候... 当前阶段：${stage}`;
      }
    }

    async function streamLessonPlan(requestBody) {
      const response = await fetch('/lesson-plan/stream', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'text/event-stream',
        },
        body: JSON.stringify(requestBody),
      });

      if (!response.ok) {
        let errorText = `服务器错误 (${response.status})`;
        try {
          const data = await response.json();
          errorText = formatApiError(data, errorText);
        } catch {}
        throw new Error(errorText);
      }

      if (!response.body) {
        throw new Error('浏览器未返回可读取的流式内容');
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split('\n\n');
        buffer = events.pop() || '';

        for (const rawEvent of events) {
          const lines = rawEvent.split('\n').filter(Boolean);
          let eventName = 'message';
          const dataLines = [];

          lines.forEach((line) => {
            if (line.startsWith('event:')) {
              eventName = line.slice(6).trim();
            } else if (line.startsWith('data:')) {
              dataLines.push(line.slice(5).trim());
            }
          });

          if (!dataLines.length) continue;

          let payload;
          try {
            payload = JSON.parse(dataLines.join('\n'));
          } catch {
            continue;
          }

          if (eventName === 'progress') {
            setLoadingText(progressTextForStage(payload.stage, payload));
            continue;
          }

          if (eventName === 'error') {
            throw new Error(payload.message || '生成失败，请稍后重试');
          }

          if (eventName === 'result') {
            return payload;
          }
        }
      }

      throw new Error('流式生成中断，请稍后重试');
    }

    async function requestMockLessonPlan(requestBody) {
      const response = await fetch('/lesson-plan/mock', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(requestBody),
      });

      if (!response.ok) {
        let errorText = `Mock接口错误 (${response.status})`;
        try {
          const data = await response.json();
          errorText = formatApiError(data, errorText);
        } catch {}
        throw new Error(errorText);
      }

      return response.json();
    }

    async function generateLessonPlan() {
      const topic = topicInput.value.trim();
      if (!topic) {
        showError('请输入内容主题');
        return;
      }

      showLoading(true);

      try {
        const templateCategory = document.getElementById('template-category').value;

        const requestBody = {
          topic: topic,
          notes: notesInput.value.trim() || null,
          collection: 'physics_fast20',
          model: modelSelect.value || null,
          template_category: templateCategory,
          conversation_state: conversationState,
        };

        let data;
        if (shouldUseMockTopic(topic, templateCategory, requestBody.notes)) {
          setLoadingText('正在生成中');
          try {
            data = await requestMockLessonPlan(requestBody);
          } catch (error) {
            setLoadingText('正在生成中');
            data = await streamLessonPlan(requestBody);
          }
        } else {
          setLoadingText('正在生成中');
          data = await streamLessonPlan(requestBody);
        }
        conversationState = data.conversation_state || null;
        if (conversationState) {
          localStorage.setItem(CONVERSATION_STATE_KEY, JSON.stringify(conversationState));
        } else {
          localStorage.removeItem(CONVERSATION_STATE_KEY);
        }
        saveHistoryRecord(data);
        renderResult(data);
      } catch (error) {
        showError(`请求失败：${error.message}`);
      } finally {
        showLoading(false);
      }
    }

    function resetForm() {
      topicInput.value = '';
      notesInput.value = '';
      resultSection.style.display = 'none';
      conversationState = null;
      localStorage.removeItem(CONVERSATION_STATE_KEY);
      planningIndicator.textContent = '';
      exportDocBtn.disabled = true;
    }

    historyList.addEventListener('click', (event) => {
      const target = event.target.closest('[data-history-action]');
      if (!target) return;

      const action = target.dataset.historyAction;
      const index = Number(target.dataset.historyIndex);
      if (!Number.isInteger(index)) return;

      if (action === 'restore') {
        restoreHistoryRecord(index);
        return;
      }

      if (action === 'view') {
        viewHistoryRecord(index);
        return;
      }

      if (action === 'delete') {
        const record = historyRecords[index];
        if (record?.id) {
          fetch(`/lesson-history/${record.id}`, { method: 'DELETE' }).catch(() => {});
        }
        historyRecords.splice(index, 1);
        persistHistory();
        renderHistory();
      }
    });

    generateBtn.addEventListener('click', generateLessonPlan);
    resetBtn.addEventListener('click', resetForm);
    exportDocBtn.addEventListener('click', exportCurrentLessonAsDocx);

    // 按Enter键生成内容
    topicInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        generateLessonPlan();
      }
    });

    loadClientConfig();
    loadTemplateCatalog();
    renderHistory();
    loadBackendHistory();
  </script>
</body>
</html>
