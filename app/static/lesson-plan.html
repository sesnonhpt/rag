<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教学模板生成 - RAG 知识库</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary-color: #0f766e;
      --primary-hover: #115e59;
      --secondary-color: #f3efe7;
      --text-color: #182126;
      --text-light: #5d6b73;
      --border-color: rgba(24, 33, 38, 0.12);
      --error-color: #ef4444;
      --success-color: #15803d;
      --background: #f5f1ea;
      --card-background: rgba(255, 252, 246, 0.9);
      --panel-background: rgba(255, 255, 255, 0.72);
      --shadow-soft: 0 18px 60px rgba(37, 53, 56, 0.12);
      --shadow-card: 0 10px 30px rgba(37, 53, 56, 0.08);
      --accent-warm: #c96f3b;
      --accent-deep: #284b63;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 111, 59, 0.1), transparent 24%),
        radial-gradient(circle at 85% 10%, rgba(15, 118, 110, 0.08), transparent 22%),
        linear-gradient(180deg, #f8f4ee 0%, #f4efe7 44%, #efe8dc 100%);
      min-height: 100vh;
      color: var(--text-color);
      letter-spacing: 0.01em;
    }

    #app {
      max-width: 1160px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    header {
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      padding: 28px 32px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(255, 250, 244, 0.88));
      border: 1px solid rgba(24, 33, 38, 0.08);
      box-shadow: 0 20px 50px rgba(45, 55, 58, 0.08);
      color: var(--text-color);
    }

    header::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      right: -120px;
      top: -160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.08), transparent 68%);
      pointer-events: none;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.06);
      border: 1px solid rgba(15, 118, 110, 0.12);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
      color: var(--primary-color);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.82fr);
      gap: 22px;
      align-items: start;
    }

    .header-title {
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      font-size: clamp(30px, 4vw, 42px);
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.035em;
      margin-bottom: 14px;
      color: var(--text-color);
      max-width: 11ch;
    }

    .header-subtitle {
      max-width: 640px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-light);
    }

    .hero-panel {
      position: relative;
      z-index: 1;
    }

    .hero-aside {
      display: grid;
      gap: 12px;
    }

    .hero-metric {
      padding: 16px 16px 14px;
      border-radius: 20px;
      background: rgba(244, 248, 248, 0.92);
      border: 1px solid rgba(24, 33, 38, 0.07);
    }

    .hero-metric-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .hero-metric-value {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-color);
    }

    .page-shell {
      display: grid;
      grid-template-columns: minmax(0, 340px) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--panel-background);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px);
      padding: 28px;
      margin-bottom: 24px;
    }

    .sidebar-stack {
      display: grid;
      gap: 18px;
      align-self: start;
      position: sticky;
      top: 20px;
    }

    .card-title {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text-color);
    }

    .card-caption {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-light);
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-color);
    }

    .form-group input[type="text"],
    .form-group select {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid rgba(24, 33, 38, 0.1);
      border-radius: 16px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.92);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .form-group input[type="text"]:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      transform: translateY(-1px);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 26px;
    }

    .btn {
      padding: 14px 22px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), #0c8b81);
      color: white;
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(15, 118, 110, 0.26);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(24, 33, 38, 0.08);
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.96);
    }

    .result-section {
      min-width: 0;
    }

    .result-card {
      background: var(--card-background);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }

    .result-card-title {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-card-content {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-color);
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-empty {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-light);
      padding: 8px 2px 2px;
    }

    .history-item {
      padding: 14px 14px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(24, 33, 38, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .history-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(37, 53, 56, 0.08);
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .history-topic {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-color);
      line-height: 1.5;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .history-summary {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-light);
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .history-btn-primary {
      background: rgba(15, 118, 110, 0.12);
      color: var(--primary-color);
    }

    .history-btn-primary:hover {
      background: rgba(15, 118, 110, 0.18);
    }

    .history-btn-secondary {
      background: rgba(24, 33, 38, 0.08);
      color: var(--text-light);
    }

    .history-btn-secondary:hover {
      background: rgba(24, 33, 38, 0.12);
    }

    .result-card-content ul {
      margin-left: 20px;
      margin-top: 8px;
    }

    .result-card-content li {
      margin-bottom: 4px;
    }

    .resources-section {
      margin-top: 24px;
    }

    .resource-item {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(24, 33, 38, 0.08);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .resource-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--primary-color), var(--accent-warm));
    }

    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .resource-source {
      font-weight: 700;
      color: var(--text-color);
      font-size: 13px;
    }

    .resource-score {
      font-size: 11px;
      color: var(--text-light);
      background: rgba(15, 118, 110, 0.08);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .resource-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-light);
      margin-top: 6px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(248, 244, 238, 0.82);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-content {
      text-align: center;
      padding: 26px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(24, 33, 38, 0.08);
      box-shadow: var(--shadow-card);
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }

    .loading-dots span {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-warm));
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
    }

    .loading-text {
      font-size: 16px;
      color: var(--text-color);
    }

    .error-message {
      background: #fff0ef;
      border: 1px solid #f8c8c4;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 24px;
      color: var(--error-color);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.08);
    }

    /* Markdown 渲染样式 */
    .markdown-content {
      line-height: 1.8;
      color: var(--text-color);
    }

    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    .markdown-content h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 2.4em;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.35em;
    }

    .markdown-content h2 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", serif;
      font-size: 1.6em;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3em;
    }

    .markdown-content h3 {
      font-size: 1.28em;
    }

    .markdown-content h4 {
      font-size: 1em;
    }

    .markdown-content p {
      margin-bottom: 16px;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin-bottom: 16px;
      padding-left: 2em;
    }

    .markdown-content li {
      margin-bottom: 8px;
    }

    .markdown-content code {
      background: rgba(24, 33, 38, 0.06);
      padding: 2px 6px;
      border-radius: 8px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
    }

    .markdown-content pre {
      background: #1f2933;
      color: #e6edf3;
      padding: 18px;
      border-radius: 18px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .markdown-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .markdown-content blockquote {
      border-left: 4px solid var(--accent-warm);
      padding: 6px 0 6px 16px;
      margin: 16px 0;
      color: var(--text-light);
      font-style: normal;
      background: rgba(201, 111, 59, 0.05);
      border-radius: 0 14px 14px 0;
    }

    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
    }

    .markdown-content th,
    .markdown-content td {
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      text-align: left;
    }

    .markdown-content th {
      background: rgba(15, 118, 110, 0.08);
      font-weight: 600;
    }

    .markdown-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 24px 0;
    }

    .markdown-content a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .markdown-content a:hover {
      text-decoration: underline;
    }

    .markdown-content img {
      display: block;
      width: min(100%, 780px);
      margin: 18px auto;
      border-radius: 18px;
      border: 1px solid rgba(24, 33, 38, 0.08);
      box-shadow: 0 16px 36px rgba(45, 55, 58, 0.12);
      background: #fff;
    }

    .markdown-content strong {
      font-weight: 600;
    }

    .markdown-content em {
      font-style: italic;
    }

    @media (max-width: 768px) {
      #app {
        padding: 18px 16px 40px;
      }

      header {
        padding: 24px 20px;
      }

      .hero-grid,
      .page-shell {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .card,
      .result-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="hero-kicker">Teaching Material Builder</div>
      <div class="hero-grid">
        <div class="hero-panel">
          <h1 class="header-title">智能教案</h1>
          <p class="header-subtitle">支持导学案与综合模板两种模式，面向真实课堂准备，减少堆砌感，让产出更清楚、更稳、更像成稿。</p>
        </div>
        <div class="hero-aside">
          <div class="hero-metric">
            <div class="hero-metric-label">内容方向</div>
            <div class="hero-metric-value">导学案更适合学生任务单，综合模板更适合讲练结合与课堂组织。</div>
          </div>
          <div class="hero-metric">
            <div class="hero-metric-label">资料依据</div>
            <div class="hero-metric-value">优先依据知识库内容生成，并保留参考文档检索结果供回看。</div>
          </div>
        </div>
      </div>
    </header>

    <div class="page-shell">
      <div class="sidebar-stack">
        <div class="card">
          <h2 class="card-title">模板设置</h2>
          <!-- <p class="card-caption">保持操作简单，只保留最关键的选择项。输入主题后，系统会按所选模式生成更像正式成稿的教学内容。</p> -->

          <div class="form-group">
            <label for="topic-input">内容主题</label>
            <input type="text" id="topic-input" placeholder="例如：法拉第与电磁感应" />
          </div>

          <div class="form-group">
            <label for="template-category">模板类别</label>
            <select id="template-category">
              <option value="guide">导学案模板</option>
              <option value="comprehensive">综合模板</option>
            </select>
          </div>

          <div class="form-group">
            <small style="color: var(--text-light); display: block; line-height: 1.75;" id="template-description">
              💡 导学案模板：自动判断学科，按学校导学案体例生成固定结构成稿
            </small>
          </div>

          <div class="form-group">
            <label for="model-select">LLM模型</label>
            <select id="model-select">
              <option value="">默认模型 (coding-glm-5-free)</option>
              <option value="gpt-4.1-free">GPT-4.1 Free</option>
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="coding-glm-5-free">Coding GLM-5 Free</option>
              <option value="gpt-4o">GPT-4o (付费)</option>
              <option value="gpt-4o-mini">GPT-4o Mini (付费)</option>
              <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet (付费)</option>
            </select>
          </div>

          <div class="button-group">
            <button class="btn btn-primary" id="generate-btn">生成内容</button>
            <button class="btn btn-secondary" id="reset-btn">重置</button>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">最近生成</h2>
          <p class="card-caption">保留最近几次主题与模板选择，方便回看或继续生成。</p>
          <div class="history-list" id="history-list"></div>
        </div>
      </div>

      <div class="result-section" id="result-section" style="display: none;">
        <div class="result-card">
          <h3 class="result-card-title">生成内容</h3>
          <div class="result-card-content markdown-content" id="lesson-content"></div>
        </div>

        <div class="result-card resources-section">
          <h3 class="result-card-title">参考文档</h3>
          <div id="resources-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-content">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-text">正在生成内容，请稍候...</div>
    </div>
  </div>

  <script>
    const topicInput = document.getElementById('topic-input');
    const modelSelect = document.getElementById('model-select');
    const generateBtn = document.getElementById('generate-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultSection = document.getElementById('result-section');
    const lessonContent = document.getElementById('lesson-content');
    const resourcesContent = document.getElementById('resources-content');
    const loadingOverlay = document.getElementById('loading-overlay');
    const CONVERSATION_STATE_KEY = 'lesson_plan_conversation_state';
    const HISTORY_STORAGE_KEY = 'lesson_plan_history_records';
    const historyList = document.getElementById('history-list');

    const templateCategorySelect = document.getElementById('template-category');
    const templateDescription = document.getElementById('template-description');
    let conversationState = null;
    let historyRecords = [];

    try {
      const savedState = localStorage.getItem(CONVERSATION_STATE_KEY);
      conversationState = savedState ? JSON.parse(savedState) : null;
    } catch {
      conversationState = null;
    }

    try {
      const savedHistory = localStorage.getItem(HISTORY_STORAGE_KEY);
      historyRecords = savedHistory ? JSON.parse(savedHistory) : [];
    } catch {
      historyRecords = [];
    }

    const templateDescriptions = {
      guide: '💡 导学案模板：自动判断学科，按学校导学案体例生成固定结构成稿',
      comprehensive: '💡 综合模板：融合导学案、讲练结合、互动设计和分层任务，生成固定结构成稿',
    };

    function updateTemplateDescription() {
      const category = templateCategorySelect.value;
      templateDescription.textContent = templateDescriptions[category] || '';
    }

    templateCategorySelect.addEventListener('change', updateTemplateDescription);

    function showLoading(show) {
      loadingOverlay.style.display = show ? 'flex' : 'none';
      generateBtn.disabled = show;
    }

    function showError(message) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      
      const card = document.querySelector('.card');
      card.insertBefore(errorDiv, card.firstChild);
      
      setTimeout(() => {
        errorDiv.remove();
      }, 5000);
    }

    function formatHistoryTime(isoString) {
      if (!isoString) return '';
      try {
        return new Date(isoString).toLocaleString('zh-CN', {
          month: 'numeric',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      } catch {
        return '';
      }
    }

    function buildHistorySummary(record) {
      if (record.subject) {
        return `${record.subject} · ${record.templateLabel || ''}`.trim();
      }
      return record.templateLabel || '最近生成记录';
    }

    function persistHistory() {
      localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyRecords));
    }

    async function loadBackendHistory() {
      if (!conversationState?.session_id) return false;
      try {
        const response = await fetch(`/lesson-history?session_id=${encodeURIComponent(conversationState.session_id)}&limit=8`);
        if (!response.ok) return false;
        const data = await response.json();
        historyRecords = Array.isArray(data.records) ? data.records : [];
        persistHistory();
        renderHistory();
        return true;
      } catch {
        return false;
      }
    }

    function renderHistory() {
      if (!historyRecords.length) {
        historyList.innerHTML = '<div class="history-empty">这里会保留最近生成的主题，方便继续修改或快速回看。</div>';
        return;
      }

      historyList.innerHTML = historyRecords.map((record, index) => `
        <div class="history-item">
          <div class="history-meta">
            <span>${record.templateLabel || '生成记录'}</span>
            <span>${formatHistoryTime(record.createdAt)}</span>
          </div>
          <div class="history-topic">${record.topic || '未命名主题'}</div>
          <div class="history-summary">${buildHistorySummary(record)}</div>
          <div class="history-actions">
            <button class="history-btn history-btn-primary" type="button" data-history-action="restore" data-history-index="${index}">继续使用</button>
            <button class="history-btn history-btn-secondary" type="button" data-history-action="delete" data-history-index="${index}">删除</button>
          </div>
        </div>
      `).join('');
    }

    function saveHistoryRecord(data) {
      const record = {
        topic: topicInput.value.trim(),
        templateCategory: templateCategorySelect.value,
        templateLabel: templateCategorySelect.options[templateCategorySelect.selectedIndex]?.textContent || '',
        subject: data.subject || '',
        createdAt: new Date().toISOString(),
        conversationState: data.conversation_state || conversationState || null,
        id: null,
      };

      if (Array.isArray(data.history_records) && data.history_records.length > 0) {
        historyRecords = data.history_records;
      } else {
        historyRecords = [
          record,
          ...historyRecords.filter(item => !(item.topic === record.topic && item.templateCategory === record.templateCategory))
        ].slice(0, 8);
      }
      persistHistory();
      renderHistory();
    }

    function restoreHistoryRecord(index) {
      const record = historyRecords[index];
      if (!record) return;
      topicInput.value = record.topic || '';
      templateCategorySelect.value = record.templateCategory || 'guide';
      conversationState = record.conversationState || null;
      updateTemplateDescription();
      topicInput.focus();
    }

    function renderResult(data) {
      resultSection.style.display = 'block';

      // 渲染生成内容（Markdown格式）
      if (data.lesson_content) {
        lessonContent.innerHTML = marked.parse(data.lesson_content);
      } else {
        lessonContent.innerHTML = '<p style="color: var(--text-light);">暂无生成内容</p>';
      }

      // 渲染图片资源
      if (data.image_resources && data.image_resources.length > 0) {
        let imagesHtml = '<div class="resources-list">';
        imagesHtml += '<h4 style="margin-bottom: 12px; color: var(--text-color);">📷 相关图片</h4>';
        imagesHtml += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px;">';
        
        data.image_resources.forEach((image, index) => {
          imagesHtml += `
            <div class="resource-item" style="padding: 12px;">
              <img src="${image.url}" alt="${image.caption || '图片 ' + (index + 1)}" 
                   style="width: 100%; height: auto; border-radius: 8px; margin-bottom: 8px;"
                   onerror="this.style.display='none'">
              <div style="font-size: 12px; color: var(--text-light);">
                <div><strong>来源:</strong> ${image.source}</div>
                ${image.page ? `<div><strong>页码:</strong> ${image.page}</div>` : ''}
                ${image.caption ? `<div><strong>描述:</strong> ${image.caption}</div>` : ''}
              </div>
            </div>
          `;
        });
        
        imagesHtml += '</div></div>';
        
        // 将图片插入到生成内容的末尾
        const imagesDiv = document.createElement('div');
        imagesDiv.innerHTML = imagesHtml;
        lessonContent.appendChild(imagesDiv);
      }

      // 渲染参考文档
      if (data.additional_resources && data.additional_resources.length > 0) {
        let resourcesHtml = '<div class="resources-list">';
        data.additional_resources.forEach((resource, index) => {
          resourcesHtml += `
            <div class="resource-item">
              <div class="resource-header">
                <span class="resource-index">#${index + 1}</span>
                <span class="resource-source">${resource.source}</span>
                <span class="resource-score">相关度: ${(resource.score * 100).toFixed(1)}%</span>
              </div>
              <div class="resource-text">${resource.text}</div>
            </div>
          `;
        });
        resourcesHtml += '</div>';
        resourcesContent.innerHTML = resourcesHtml;
      } else {
        resourcesContent.innerHTML = '<p style="color: var(--text-light); padding: 16px;">未检索到相关文档（基于LLM自身知识生成）</p>';
      }
    }

    async function generateLessonPlan() {
      const topic = topicInput.value.trim();
      if (!topic) {
        showError('请输入内容主题');
        return;
      }

      showLoading(true);

      try {
        const templateCategory = document.getElementById('template-category').value;

        const requestBody = {
          topic: topic,
          collection: 'default',
          model: modelSelect.value || null,
          template_category: templateCategory,
          conversation_state: conversationState,
        };

        const response = await fetch('/lesson-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody),
        });

        if (!response.ok) {
          let errorText = `服务器错误 (${response.status})`;
          try {
            const data = await response.json();
            errorText = data.error || data.detail || errorText;
          } catch {}
          showError(errorText);
          return;
        }

        const data = await response.json();
        conversationState = data.conversation_state || null;
        if (conversationState) {
          localStorage.setItem(CONVERSATION_STATE_KEY, JSON.stringify(conversationState));
        } else {
          localStorage.removeItem(CONVERSATION_STATE_KEY);
        }
        saveHistoryRecord(data);
        renderResult(data);
      } catch (error) {
        showError(`请求失败：${error.message}`);
      } finally {
        showLoading(false);
      }
    }

    function resetForm() {
      topicInput.value = '';
      resultSection.style.display = 'none';
      conversationState = null;
      localStorage.removeItem(CONVERSATION_STATE_KEY);
    }

    historyList.addEventListener('click', (event) => {
      const target = event.target.closest('[data-history-action]');
      if (!target) return;

      const action = target.dataset.historyAction;
      const index = Number(target.dataset.historyIndex);
      if (!Number.isInteger(index)) return;

      if (action === 'restore') {
        restoreHistoryRecord(index);
        return;
      }

      if (action === 'delete') {
        const record = historyRecords[index];
        if (record?.id) {
          fetch(`/lesson-history/${record.id}`, { method: 'DELETE' }).catch(() => {});
        }
        historyRecords.splice(index, 1);
        persistHistory();
        renderHistory();
      }
    });

    generateBtn.addEventListener('click', generateLessonPlan);
    resetBtn.addEventListener('click', resetForm);

    // 按Enter键生成内容
    topicInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        generateLessonPlan();
      }
    });

    updateTemplateDescription();
    renderHistory();
    loadBackendHistory();
  </script>
</body>
</html>
