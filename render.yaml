# ============================================================
# Modular RAG 项目 - Render Blueprint 配置
# ============================================================
# 部署步骤：
# 1. git push 到 GitHub
# 2. https://render.com → New → Blueprint → 连接 GitHub 仓库
# 3. 点击 Apply，Render 自动读取此文件并创建服务
# 4. 在 Render Dashboard 为每个服务设置环境变量（见下方）
# ============================================================

services:
  # ── FastAPI Web API ──────────────────────────────────────
  - type: web
    name: rag-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      # LLM 配置（必填 – AiHubMix OpenAI 兼容 API）
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: "openai"
      - key: LLM_BASE_URL
        value: "https://aihubmix.com/v1"
      - key: LLM_MODEL
        value: "coding-glm-5-free"

      # Embedding 配置（必填）
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: "openai"
      - key: EMBEDDING_BASE_URL
        value: "https://aihubmix.com/v1"
      - key: EMBEDDING_MODEL
        value: "qwen3-embedding-4b"
      - key: EMBEDDING_DIMENSIONS
        value: "2560"

      # Vision LLM（可选，PDF/图片理解）
      - key: VISION_LLM_API_KEY
        sync: false
      - key: VISION_LLM_PROVIDER
        value: "openai"
      - key: VISION_LLM_BASE_URL
        value: "https://aihubmix.com/v1"
      - key: VISION_LLM_MODEL
        value: "gpt-4o"

      # ── 向量库：Qdrant Cloud（生产推荐）───────────────
      # 注册 https://cloud.qdrant.io（免费，无需信用卡）
      # 创建 Cluster 后填入以下 3 个值：
      - key: VECTOR_STORE_PROVIDER
        value: "qdrant"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: "default"
      - key: QDRANT_VECTOR_DIM
        value: "2560"

      # BM25 索引文件（如果 ingestion 在本地做了的话）
      # 上传 data/bm25_index.json 到 Render Disk 或外部存储后填路径
      # 建议：Render Starter plan ($7/月）挂载 Render Disk 持久化 BM25

      # Trace 文件（可选 – 关闭以避免写入本地文件）
      - key: OBSERVABILITY_TRACE_ENABLED
        value: "false"

  # ── Streamlit Dashboard ─────────────────────────────────
  # 独立服务，通过 rag-api 暴露的地址通信
  - type: web
    name: rag-dashboard
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.dashboard
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      # API 地址：引用 rag-api 的 RENDER_EXTERNAL_URL
      - key: API_BASE_URL
        fromService:
          type: web
          name: rag-api
          envVarKey: RENDER_EXTERNAL_URL
          default: "http://localhost:8000"

      # Dashboard 自己的 LLM 配置（部分面板需要）
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: "openai"
      - key: LLM_BASE_URL
        value: "https://aihubmix.com/v1"
      - key: LLM_MODEL
        value: "coding-glm-5-free"

      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: "openai"
      - key: EMBEDDING_BASE_URL
        value: "https://aihubmix.com/v1"
      - key: EMBEDDING_MODEL
        value: "qwen3-embedding-4b"

      # Streamlit server config
      - key: STREAMLIT_SERVER_PORT
        value: "10000"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
